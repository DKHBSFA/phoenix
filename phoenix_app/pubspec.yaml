name: phoenix_app
description: Phoenix Protocol - Training, Conditioning, Nutrition for longevity.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0
  flutter: ^3.29.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Audio
  just_audio: ^0.9.42
  audio_session: ^0.1.23

  # Notifications & background
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.6.0
  timezone: ^0.10.1

  # UI
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  tdesign_flutter:
    git:
      url: https://github.com/Tencent/tdesign-flutter.git
      ref: c7441172b1b2bebcdb31763322e43b126c689ffa
      path: tdesign-component

  # TTS
  flutter_tts: ^4.2.0

  # BLE — Smart ring integration (Colmi R10)
  universal_ble: ^1.2.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.19.1

  # FFI for bitnet.cpp
  ffi: ^2.1.3

  # AI model download & verification
  dio: ^5.4.0
  crypto: ^3.0.3

  # Network connectivity check
  connectivity_plus: ^6.1.1

  # Home screen widget
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.3

flutter:
  uses-material-design: true
  assets:
    - assets/exercises/
    - assets/sounds/
    - assets/phoenix_logo.svg
    - assets/phoenix_logo.png
