name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/update-version.sh "$VERSION" phoenix_app/pubspec.yaml

      - name: Get dependencies
        working-directory: phoenix_app
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: phoenix_app
        run: flutter build apk --debug

      - name: Rename APK
        run: |
          mv phoenix_app/build/app/outputs/flutter-apk/app-debug.apk \
             phoenix-${GITHUB_REF_NAME}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: phoenix-${{ github.ref_name }}.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev libjsoncpp-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/update-version.sh "$VERSION" phoenix_app/pubspec.yaml

      - name: Get dependencies
        working-directory: phoenix_app
        run: flutter pub get

      - name: Build Linux
        working-directory: phoenix_app
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          tar -czf phoenix-${GITHUB_REF_NAME}-linux-x64.tar.gz \
            -C phoenix_app/build/linux/x64/release bundle

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: phoenix-${{ github.ref_name }}-linux-x64.tar.gz

  release:
    needs: [build-apk, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: apk

      - uses: actions/download-artifact@v4
        with:
          name: linux

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            phoenix-${GITHUB_REF_NAME}.apk \
            phoenix-${GITHUB_REF_NAME}-linux-x64.tar.gz
